name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Smoke test — routes render
        run: |
          test -f dist/index.html
          test -f dist/association/index.html
          test -f dist/isolement-corporel/index.html
          test -f dist/pour/index.html
          test -f dist/agir/index.html
          test -f dist/soutenir/index.html
          test -f dist/contact/index.html
          test -f dist/mentions-legales/index.html
          test -f dist/politique-confidentialite/index.html
          test -f dist/404.html
          test -f dist/sitemap-index.xml
          echo "All expected routes present."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check secrets are configured
        id: check
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=()
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_PATH" ] && missing+=("DEPLOY_PATH")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::notice::Déploiement ignoré — secrets manquants : ${missing[*]}. Voir README section « Déploiement serveur »."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install SSH key
        if: steps.check.outputs.skip == 'false'
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync dist/ to server
        if: steps.check.outputs.skip == 'false'
        run: |
          rsync -avz --delete \
            --rsh="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Done
        if: steps.check.outputs.skip == 'false'
        run: echo "Déployé sur ${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}"
