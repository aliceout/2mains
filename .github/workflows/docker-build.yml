name: Docker build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Type check + a11y
    runs-on: ubuntu-latest
    # ADDRESS factice au niveau job — on teste juste que ça compile.
    # `astro check` ET `astro build` chargent astro.config.mjs qui
    # throw si la var manque. La vraie valeur arrive en build-arg
    # sur le job build-site.
    env:
      ADDRESS: https://example.invalid
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build (Astro Node SSR)
        run: pnpm build

      # Smoke test mode SSR : on vérifie que le bundle Node a bien été
      # produit. Pas de `dist/<route>/index.html` à tester (plus de SSG).
      - name: Smoke test — SSR bundle exists
        run: |
          test -f dist/server/entry.mjs
          test -d dist/client
          echo "SSR bundle present."

      # A11y deep désactivé côté CI tant qu'on n'a pas de Payload
      # accessible : `astro preview` charge dist/ et tape Payload pour
      # rendre les pages, ce qui exige une instance Payload joignable.
      # À ré-activer en Phase 5 avec un mock ou un Payload de test.

  build-site:
    name: Build & push site image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ADDRESS = URL publique du site. Lue depuis Infisical (source
      # de vérité unique avec la prod) et passée en build-arg au
      # Dockerfile.site, parce que Astro fige `site:` dans dist/ au
      # build (sitemap, RSS, JSON-LD). En prod runtime, deploy.sh
      # refetch Infisical et alimente .env qui est consommé par
      # docker compose (compose.yml expose ADDRESS au service site).
      - name: Fetch build-time secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: universal
          domain: ${{ secrets.INFISICAL_API_URL }}
          client-id: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_ID }}
          env-slug: prod
          secret-path: /services/2mains
          export-type: env

      - name: Build and push site
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.site
          push: true
          build-args: |
            ADDRESS=${{ env.ADDRESS }}
          tags: |
            ghcr.io/aliceout/2mains-site:latest
            ghcr.io/aliceout/2mains-site:${{ github.sha }}
          cache-from: type=gha,scope=site
          cache-to: type=gha,scope=site,mode=max

  build-payload:
    name: Build & push payload image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push payload
        uses: docker/build-push-action@v6
        with:
          context: services/payload
          file: services/payload/Dockerfile
          push: true
          tags: |
            ghcr.io/aliceout/2mains-payload:latest
            ghcr.io/aliceout/2mains-payload:${{ github.sha }}
          cache-from: type=gha,scope=payload
          cache-to: type=gha,scope=payload,mode=max

  build-mail:
    name: Build & push mail image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mail
        uses: docker/build-push-action@v6
        with:
          context: services/mail
          file: services/mail/Dockerfile
          push: true
          tags: |
            ghcr.io/aliceout/2mains-mail:latest
            ghcr.io/aliceout/2mains-mail:${{ github.sha }}
          cache-from: type=gha,scope=mail
          cache-to: type=gha,scope=mail,mode=max
