<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2mains de femmes — version vivante (redressée)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    background: #FBF7EE;
    color: #1F1A14;
    -webkit-font-smoothing: antialiased;
  }
  a { text-decoration: none; }
  button { font-family: inherit; }
  input, button { outline: none; }
  input:focus { border-color: #4A3D85 !important; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="final-home.jsx"></script>
<script type="text/babel" src="final-blocks.jsx"></script>
<script type="text/babel" src="final-vivant-v2.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
function App() {
  const [page, setPage] = React.useState("home");
  React.useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [page]);
  return (
    <>
      <NavBar active={
        page === "home" ? "Accueil" :
        page === "structure" ? "Structures" :
        page === "femme" ? "Femmes accompagnées" :
        page === "entreprise" ? "Entreprises" :
        page === "blocks" ? "Bibliothèque" : ""
      } page={page} setPage={setPage} />
      {page === "home" && <HomePageVivantV2 />}
      {page === "structure" && <StructurePage />}
      {page === "femme" && <FemmePage />}
      {page === "entreprise" && <EntreprisePage />}
      {page === "blocks" && <BlocksPage />}
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
