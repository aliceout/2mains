# Compose PROD — 4 services sur réseau Docker interne.
#
# Topologie :
#   db      (postgres:16-alpine)        non exposé, accessible uniquement par `payload`
#   payload (ghcr.io/.../2mains-payload) 127.0.0.1:${PORT_PAYLOAD}  → /cms/admin + /cms/api
#   site    (ghcr.io/.../2mains-site)    127.0.0.1:${PORT_SITE}    → / (Astro SSR)
#   mail    (ghcr.io/.../2mains-mail)    127.0.0.1:${PORT_MAIL}    → /api/contact
#
# Le reverse proxy nginx du VPS (hors compose) termine TLS et route :
#   ${ADDRESS}/cms/* → 127.0.0.1:${PORT_PAYLOAD}
#   ${ADDRESS}/api/* → 127.0.0.1:${PORT_MAIL}
#   ${ADDRESS}/*     → 127.0.0.1:${PORT_SITE}
#
# Convention historique : 8066 / 8064 / 8065. Modifiable via Infisical
# (path /services/2mains), mais doit rester aligné avec la config
# nginx du VPS (sinon 502).
#
# Data persistante = bind mounts sous $DATA_DIR (= $HOME/data/2mains,
# injecté par scripts/deploy.sh) :
#   $DATA_DIR/postgres/      → /var/lib/postgresql/data
#   $DATA_DIR/payload-media/ → /app/media
#
# Secrets = .env racine, généré à chaque deploy par scripts/deploy.sh
# depuis Infisical. Jamais commité.

services:
  db:
    image: postgres:16-alpine
    container_name: 2mains-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    volumes:
      - ${DATA_DIR:?DATA_DIR required}/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  payload:
    image: ghcr.io/aliceout/2mains-payload:latest
    container_name: 2mains-payload
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET required}
      ADDRESS: ${ADDRESS:?ADDRESS required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      # SMTP : Payload envoie les mails d'invitation, OTP 2FA et notifs
      # de sécurité via le même transport SMTP que le service mail.
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS required}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM required}
      # Auth — toutes optionnelles, defaults dans services/payload/src/auth/config.ts.
      INVITATION_TTL_DAYS: ${INVITATION_TTL_DAYS:-}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-}
      TRUSTED_DEVICE_TTL_DAYS: ${TRUSTED_DEVICE_TTL_DAYS:-}
      SESSION_INACTIVE_HOURS: ${SESSION_INACTIVE_HOURS:-}
      # Pour debug HTTP en dev/staging uniquement. En prod doit rester non-true.
      PAYLOAD_INSECURE_COOKIES: ${PAYLOAD_INSECURE_COOKIES:-}
    volumes:
      - ${DATA_DIR:?DATA_DIR required}/payload-media:/app/media
    ports:
      - "127.0.0.1:${PORT_PAYLOAD:?PORT_PAYLOAD required}:3001"
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/cms/api/access"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  site:
    image: ghcr.io/aliceout/2mains-site:latest
    container_name: 2mains-site
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4321"
      PAYLOAD_INTERNAL_URL: http://payload:3001
      ADDRESS: ${ADDRESS:?ADDRESS required}
      MAIL_TO: ${MAIL_TO:?MAIL_TO required}
    ports:
      - "127.0.0.1:${PORT_SITE:?PORT_SITE required}:4321"
    networks:
      - internal
    depends_on:
      payload:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mail:
    image: ghcr.io/aliceout/2mains-mail:latest
    container_name: 2mains-mail
    restart: unless-stopped
    pull_policy: always
    environment:
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS required}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM required}
      MAIL_TO: ${MAIL_TO:?MAIL_TO required}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-20}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?ALLOWED_ORIGIN required}
    ports:
      - "127.0.0.1:${PORT_MAIL:?PORT_MAIL required}:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
