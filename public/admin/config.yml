# Sveltia CMS — configuration.
# Doc : https://github.com/sveltia/sveltia-cms
#
# Backend GitHub : authentification par OAuth via le proxy sveltia-cms-auth
# déployé côté serveur 2mains de femmes.

backend:
  name: github
  repo: aliceout/2mains
  branch: main
  # À renseigner quand le proxy OAuth est en place :
  # auth_endpoint: https://auth.2mainsdefemmes.org/auth
  # base_url: https://auth.2mainsdefemmes.org

locale: fr
publish_mode: simple

media_folder: public/uploads
public_folder: /uploads

collections:
  # ---- Pages statiques éditables ----
  # Chaque page = un hero (accroche en haut) + une liste de sections typées.
  # Les sections sont empilées dans l'ordre. Chaque type de section rend un
  # bloc visuel différent côté site (prose, cartes, valeurs, chiffres, FAQ,
  # étapes, 2 colonnes, callout, citation, etc).
  - name: pages
    label: Pages
    label_singular: Page
    folder: content/pages
    create: false
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{slug}}'
    summary: '{{title}}'
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: description, label: 'Description SEO', widget: string, required: false }
      - {
          name: toc,
          label: 'Afficher un sommaire à droite',
          widget: boolean,
          default: false,
          required: false,
          hint: "Recommandé pour les pages longues avec plusieurs sections titrées.",
        }

      # Hero (bandeau du haut)
      - name: hero
        label: "Hero (bandeau d'introduction)"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: titre, label: Titre, widget: string }
          - { name: sousTitre, label: 'Sur-titre', widget: string, required: false }
          - { name: accroche, label: Accroche, widget: text, required: false }
          - name: variant
            label: 'Couleur de fond'
            widget: select
            options: ['beige', 'orange', 'violet', 'magenta', 'vert', 'bleu']
            default: beige
          - name: cta_primaire
            label: 'CTA principal'
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: label, label: Texte, widget: string }
              - { name: href, label: Lien, widget: string }
              - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }
          - name: cta_secondaire
            label: 'CTA secondaire'
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: label, label: Texte, widget: string }
              - { name: href, label: Lien, widget: string }
              - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

      # Sections — liste avec plusieurs types possibles
      - name: sections
        label: Sections
        label_singular: Section
        widget: list
        required: false
        types:
          # === Texte riche ===
          - name: prose
            label: '📝 Texte'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - &fondField
                name: fond
                label: 'Couleur de fond'
                widget: select
                options: ['paper', 'beige', 'orange', 'violet', 'magenta', 'vert', 'bleu']
                default: paper
                required: false
              - { name: body, label: Contenu, widget: markdown }

          # === Grille de cartes ===
          - name: cartes
            label: '🗂 Grille de cartes'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3', '4']
                default: '3'
              - name: cartes
                label: Cartes
                widget: list
                fields:
                  - { name: titre, label: Titre, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: href, label: 'Lien', widget: string, required: false }
                  - { name: cta, label: 'Texte du lien', widget: string, required: false }
                  - &couleurField
                    name: couleur
                    label: Couleur
                    widget: select
                    options: ['orange', 'violet', 'magenta', 'vert', 'bleu']
                    default: orange
                    required: false

          # === Quatre valeurs (pastilles) ===
          - name: valeurs
            label: '🌱 Valeurs'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: valeurs
                label: Valeurs
                widget: list
                fields:
                  - { name: nom, label: Nom, widget: string }
                  - { name: description, label: Description, widget: text }
                  - *couleurField

          # === Stats (grille de chiffres) ===
          - name: stats
            label: '📊 Stats (grille de chiffres)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: intro, label: 'Paragraphe introductif', widget: text, required: false }
              - name: stats
                label: Chiffres
                widget: list
                fields:
                  - { name: valeur, label: 'Chiffre', widget: string }
                  - { name: legende, label: Légende, widget: text }
                  - { name: source, label: Source, widget: string, required: false }

          # === Citation ===
          - name: citation
            label: '💬 Citation'
            widget: object
            fields:
              - *fondField
              - { name: citation, label: Citation, widget: text }
              - { name: auteur, label: Auteur, widget: string }
              - { name: role, label: 'Rôle / contexte', widget: string, required: false }
              - name: variant
                label: 'Style'
                widget: select
                options: ['beige', 'violet', 'paper']
                default: beige
              - { name: fictif, label: 'Citation fictive ?', widget: boolean, default: false }

          # === Bandeau CTA ===
          - name: cta
            label: '🎯 Bandeau CTA'
            widget: object
            fields:
              - *fondField
              - { name: titre, label: Titre, widget: string }
              - { name: corps, label: 'Court texte', widget: text, required: false }
              - name: cta_primaire
                label: 'CTA principal'
                widget: object
                required: false
                fields:
                  - { name: label, label: Texte, widget: string }
                  - { name: href, label: Lien, widget: string }
                  - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }
              - name: cta_secondaire
                label: 'CTA secondaire'
                widget: object
                required: false
                fields:
                  - { name: label, label: Texte, widget: string }
                  - { name: href, label: Lien, widget: string }
                  - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

          # === Étapes numérotées ===
          - name: etapes
            label: '①②③ Étapes numérotées'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - *couleurField
              - name: etapes
                label: Étapes
                widget: list
                fields:
                  - { name: titre, label: 'Titre', widget: string }
                  - { name: description, label: Description, widget: text, required: false }

          # === Deux colonnes (texte + picto) ===
          - name: deux-colonnes
            label: '⬛⬜ Deux colonnes (texte + picto)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: inverse, label: 'Picto à droite ?', widget: boolean, default: false }
              - { name: texte, label: Texte, widget: markdown }
              - name: picto_couleur
                label: 'Couleur du picto'
                widget: select
                options: ['orange', 'violet', 'magenta', 'vert', 'bleu', 'beige']
                default: orange
              - { name: image, label: 'Image (optionnel, remplace le picto)', widget: image, required: false }
              - { name: image_alt, label: 'Description image (alt)', widget: string, required: false }

          # === FAQ ===
          - name: faq
            label: '❓ FAQ (questions repliables)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: questions
                label: Questions
                widget: list
                fields:
                  - { name: question, label: Question, widget: string }
                  - { name: reponse, label: Réponse, widget: markdown }

          # === Callout (encadré) ===
          - name: callout
            label: '💡 Encadré (callout)'
            widget: object
            fields:
              - *fondField
              - name: ton
                label: Ton
                widget: select
                options: ['info', 'important', 'astuce', 'note']
                default: info
              - { name: titre, label: Titre, widget: string, required: false }
              - { name: body, label: Contenu, widget: markdown }

          # === Chiffre détaillé ===
          - name: chiffre-detail
            label: '🔢 Chiffre + explication'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: chiffre, label: Chiffre, widget: string, hint: "Ex: 90 %, 1/3, 7 M+" }
              - { name: texte, label: Explication, widget: markdown }
              - { name: source, label: Source, widget: string, required: false }
              - name: alignement
                label: Alignement
                widget: select
                options: ['gauche', 'droite']
                default: gauche
              - *couleurField

          # === Formats (cartes riches) ===
          - name: formats
            label: '📋 Formats (cartes détaillées)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3']
                default: '2'
              - name: formats
                label: Formats
                widget: list
                fields:
                  - { name: titre, label: Titre, widget: string }
                  - { name: description, label: Description, widget: text, required: false }
                  - name: points
                    label: 'Points clés (un par ligne)'
                    widget: list
                    required: false
                    field: { name: point, widget: string, label: Point }
                  - *couleurField
                  - name: cta
                    label: 'Lien (optionnel)'
                    widget: object
                    required: false
                    fields:
                      - { name: label, label: Texte, widget: string }
                      - { name: href, label: URL, widget: string }
                      - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

          # === Citation large ===
          - name: citation-large
            label: '❝ Citation pleine largeur'
            widget: object
            fields:
              - *fondField
              - { name: citation, label: Citation, widget: text }
              - { name: auteur, label: Auteur, widget: string, required: false }
              - { name: role, label: 'Rôle / contexte', widget: string, required: false }
              - name: variant
                label: Style
                widget: select
                options: ['paper', 'beige', 'orange', 'violet']
                default: paper

  # ---- Agenda ----
  - name: evenements
    label: Événements
    label_singular: Événement
    folder: content/evenements
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{date_debut | date("DD/MM/YYYY")}} — {{title}}'
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: date_debut, label: 'Début', widget: datetime, picker_utc: false }
      - { name: date_fin, label: 'Fin', widget: datetime, picker_utc: false, required: false }
      - { name: lieu, label: Lieu, widget: string }
      - { name: adresse, label: Adresse, widget: string, required: false }
      - { name: cover, label: Image, widget: image, required: false }
      - name: public
        label: Public
        widget: select
        options: ['tout public', 'professionnels', 'femmes concernées', 'adhérents']
      - { name: gratuit, label: Gratuit, widget: boolean, default: true }
      - { name: inscription_url, label: "URL d'inscription", widget: string, required: false }
      - { name: description, label: Description, widget: markdown }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, l'événement n'apparaît pas sur le site en ligne — utile pour préparer tranquillement.",
        }

  # ---- Partenaires / financeurs ----
  - name: partenaires
    label: Partenaires
    label_singular: Partenaire
    folder: content/partenaires
    create: true
    extension: md
    format: frontmatter
    identifier_field: nom
    slug: '{{slug}}'
    fields:
      - { name: nom, label: Nom, widget: string }
      - name: type
        label: Type
        widget: select
        options: ['financeur public', 'financeur privé', 'partenaire associatif', 'réseau']
      - { name: logo, label: Logo, widget: image, required: false }
      - { name: url, label: 'URL du site', widget: string, required: false }
      - { name: description_courte, label: Description courte, widget: string, required: false }
      - { name: ordre, label: 'Ordre d''affichage', widget: number, default: 0, value_type: int }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le partenaire n'apparaît pas sur le site en ligne — utile quand l'accord n'est pas encore validé.",
        }

  # ---- Équipe / CA ----
  - name: equipe
    label: Équipe
    label_singular: Membre
    folder: content/equipe
    create: true
    extension: md
    format: frontmatter
    identifier_field: nom
    slug: '{{slug}}'
    fields:
      - { name: nom, label: 'Nom complet', widget: string }
      - { name: role, label: Rôle, widget: string }
      - { name: photo, label: Photo, widget: image, required: false }
      - { name: bio_courte, label: Bio courte, widget: text, required: false }
      - { name: linkedin, label: 'URL LinkedIn', widget: string, required: false }
      - { name: ordre, label: 'Ordre', widget: number, default: 0, value_type: int }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le membre n'apparaît pas sur le site en ligne.",
        }

  # ---- Documents téléchargeables ----
  - name: documents
    label: Documents
    label_singular: Document
    folder: content/documents
    create: true
    extension: md
    format: frontmatter
    identifier_field: titre
    slug: '{{slug}}'
    fields:
      - { name: titre, label: Titre, widget: string }
      - name: categorie
        label: Catégorie
        widget: select
        options:
          ['projet associatif', "rapport d'activité", 'ressource', 'communication', 'présentation']
      - {
          name: fichier,
          label: 'Fichier (PDF)',
          widget: file,
          required: false,
          hint: "Optionnel si le document est à paraître.",
        }
      - { name: date, label: Date, widget: datetime, type: date, required: false }
      - { name: description_courte, label: Description courte, widget: text, required: false }
      - {
          name: a_paraitre,
          label: 'À paraître ?',
          widget: boolean,
          default: false,
          hint: "Si coché, le document apparaît comme 'À paraître' sans lien de téléchargement.",
        }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le document n'apparaît pas sur le site en ligne.",
        }

  # ---- Témoignages ----
  - name: temoignages
    label: Témoignages
    label_singular: Témoignage
    folder: content/temoignages
    create: true
    extension: md
    format: frontmatter
    identifier_field: auteur
    slug: '{{slug}}'
    fields:
      - { name: auteur, label: Auteur, widget: string }
      - { name: role, label: 'Rôle / contexte', widget: string, required: false }
      - name: contexte
        label: Type
        widget: select
        options: ['participante', 'partenaire', 'professionnelle']
      - { name: photo, label: Photo, widget: image, required: false }
      - { name: ordre, label: 'Ordre', widget: number, default: 0, value_type: int }
      - {
          name: fictif,
          label: 'Témoignage fictif ?',
          widget: boolean,
          default: false,
          hint: 'Si coché, affiche un ruban « À valider » sur le site — utile pour les placeholders.',
        }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le témoignage n'apparaît pas sur le site en ligne — utile tant que la personne n'a pas validé sa citation.",
        }
      - { name: body, label: Texte, widget: markdown }

  # ---- Paramètres globaux du site ----
  - name: site
    label: Paramètres globaux
    files:
      - name: settings
        label: Paramètres
        file: content/site/settings.md
        fields:
          - { name: nom_asso, label: "Nom de l'association", widget: string }
          - { name: accroche_globale, label: Accroche globale, widget: string }
          - { name: email_contact, label: Email contact, widget: string }
          - { name: telephone, label: Téléphone, widget: string }
          - { name: adresse, label: Adresse, widget: string }
          - { name: helloasso_url, label: URL HelloAsso don, widget: string }
          - name: reseaux
            label: Réseaux sociaux
            widget: object
            fields:
              - { name: facebook, label: Facebook, widget: string, required: false }
              - { name: instagram, label: Instagram, widget: string, required: false }
              - { name: linkedin, label: LinkedIn, widget: string, required: false }
          - name: banderole_urgence
            label: "Banderole d'urgence (message en haut de site)"
            widget: object
            required: false
            fields:
              - { name: active, label: Active, widget: boolean, default: false }
              - { name: message, label: Message, widget: markdown, required: false }
              - name: couleur
                label: Couleur
                widget: select
                options: ['orange', 'violet', 'magenta']
                default: orange
