# Sveltia CMS — configuration.
# Doc : https://github.com/sveltia/sveltia-cms
#
# Backend GitHub : authentification par OAuth via le proxy sveltia-cms-auth
# déployé côté serveur 2mains de femmes.

backend:
  name: github
  repo: aliceout/2mains
  branch: main
  # À renseigner quand le proxy OAuth est en place :
  # auth_endpoint: https://auth.2mainsdefemmes.org/auth
  # base_url: https://auth.2mainsdefemmes.org

locale: fr
publish_mode: simple

media_folder: public/uploads
public_folder: /uploads

# Intégration stock photos — Sveltia expose nativement une recherche
# Unsplash dans le champ image. Audrey colle sa propre clé API Unsplash
# (gratuite sur unsplash.com/developers) au premier usage, stockée en
# localStorage de son navigateur. Les URLs insérées sont en hotlink vers
# le CDN Unsplash ; un script de build (scripts/fetch-unsplash.mjs) les
# télécharge ensuite en local pour servir les visiteurs sans fuite d'IP.
media_libraries:
  stock_assets:
    providers:
      - unsplash

collections:
  # ---- Pages statiques éditables ----
  # Chaque page = un hero (accroche en haut) + une liste de sections typées.
  # Les sections sont empilées dans l'ordre. Chaque type de section rend un
  # bloc visuel différent côté site (prose, cartes, valeurs, chiffres, FAQ,
  # étapes, 2 colonnes, callout, citation, etc).
  - name: pages
    label: Pages
    label_singular: Page
    folder: content/pages
    create: false
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{slug}}'
    summary: '{{title}}'
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: description, label: 'Description SEO', widget: string, required: false }

      # Hero (bandeau du haut)
      - name: hero
        label: "Hero (bandeau d'introduction)"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: titre, label: Titre, widget: string }
          - { name: sousTitre, label: 'Sur-titre', widget: string, required: false }
          - { name: accroche, label: Accroche, widget: text, required: false }
          - name: variant
            label: 'Couleur de fond'
            widget: select
            options: ['beige', 'orange', 'violet', 'magenta', 'vert', 'bleu']
            default: beige
          - name: cta_primaire
            label: 'CTA principal'
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: label, label: Texte, widget: string }
              - { name: href, label: Lien, widget: string }
              - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }
          - name: cta_secondaire
            label: 'CTA secondaire'
            widget: object
            required: false
            collapsed: true
            fields:
              - { name: label, label: Texte, widget: string }
              - { name: href, label: Lien, widget: string }
              - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

      # Sections — liste avec plusieurs types possibles
      - name: sections
        label: Sections
        label_singular: Section
        widget: list
        required: false
        types:
          # === Texte riche ===
          - name: prose
            label: '📝 Texte'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - &fondField
                name: fond
                label: 'Couleur de fond'
                widget: select
                options: ['paper', 'beige', 'orange', 'violet', 'magenta', 'vert', 'bleu']
                default: paper
                required: false
              - { name: body, label: Contenu, widget: markdown }

          # === Grille de cartes ===
          - name: cartes
            label: '🗂 Grille de cartes'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3', '4']
                default: '3'
              - name: cartes
                label: Cartes
                widget: list
                fields:
                  - { name: titre, label: Titre, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: href, label: 'Lien', widget: string, required: false }
                  - { name: cta, label: 'Texte du lien', widget: string, required: false }
                  - &couleurField
                    name: couleur
                    label: Couleur
                    widget: select
                    options: ['orange', 'violet', 'magenta', 'vert', 'bleu']
                    default: orange
                    required: false

          # === Quatre valeurs (pastilles) ===
          - name: valeurs
            label: '🌱 Valeurs'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: valeurs
                label: Valeurs
                widget: list
                fields:
                  - { name: nom, label: Nom, widget: string }
                  - { name: description, label: Description, widget: text }
                  - *couleurField

          # === Stats (grille de chiffres) ===
          - name: stats
            label: '📊 Stats (grille de chiffres)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: intro, label: 'Paragraphe introductif', widget: text, required: false }
              - name: stats
                label: Chiffres
                widget: list
                fields:
                  - { name: valeur, label: 'Chiffre', widget: string }
                  - { name: legende, label: Légende, widget: text }
                  - { name: source, label: Source, widget: string, required: false }

          # === Citation ===
          - name: citation
            label: '💬 Citation'
            widget: object
            fields:
              - *fondField
              - { name: citation, label: Citation, widget: text }
              - { name: auteur, label: Auteur, widget: string }
              - { name: role, label: 'Rôle / contexte', widget: string, required: false }
              - name: variant
                label: 'Style'
                widget: select
                options: ['beige', 'violet', 'paper']
                default: beige
              - { name: fictif, label: 'Citation fictive ?', widget: boolean, default: false }

          # === Bandeau CTA ===
          - name: cta
            label: '🎯 Bandeau CTA'
            widget: object
            fields:
              - *fondField
              - { name: titre, label: Titre, widget: string }
              - { name: corps, label: 'Court texte', widget: text, required: false }
              - name: cta_primaire
                label: 'CTA principal'
                widget: object
                required: false
                fields:
                  - { name: label, label: Texte, widget: string }
                  - { name: href, label: Lien, widget: string }
                  - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }
              - name: cta_secondaire
                label: 'CTA secondaire'
                widget: object
                required: false
                fields:
                  - { name: label, label: Texte, widget: string }
                  - { name: href, label: Lien, widget: string }
                  - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

          # === Étapes numérotées ===
          - name: etapes
            label: '①②③ Étapes numérotées'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - *couleurField
              - name: etapes
                label: Étapes
                widget: list
                fields:
                  - { name: titre, label: 'Titre', widget: string }
                  - { name: description, label: Description, widget: text, required: false }

          # === Deux colonnes (texte + picto) ===
          - name: deux-colonnes
            label: '⬛⬜ Deux colonnes (texte + picto)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: inverse, label: 'Picto à droite ?', widget: boolean, default: false }
              - { name: texte, label: Texte, widget: markdown }
              - name: picto_couleur
                label: 'Couleur du picto'
                widget: select
                options: ['orange', 'violet', 'magenta', 'vert', 'bleu', 'beige']
                default: orange
              - { name: image, label: 'Image (optionnel, remplace le picto)', widget: image, required: false }
              - { name: image_alt, label: 'Description image (alt)', widget: string, required: false }

          # === FAQ ===
          - name: faq
            label: '❓ FAQ (questions repliables)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: questions
                label: Questions
                widget: list
                fields:
                  - { name: question, label: Question, widget: string }
                  - { name: reponse, label: Réponse, widget: markdown }

          # === Callout (encadré) ===
          - name: callout
            label: '💡 Encadré (callout)'
            widget: object
            fields:
              - *fondField
              - name: ton
                label: Ton
                widget: select
                options: ['info', 'important', 'astuce', 'note']
                default: info
              - { name: titre, label: Titre, widget: string, required: false }
              - { name: body, label: Contenu, widget: markdown }

          # === Chiffre détaillé ===
          - name: chiffre-detail
            label: '🔢 Chiffre + explication'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: chiffre, label: Chiffre, widget: string, hint: "Ex: 90 %, 1/3, 7 M+" }
              - { name: texte, label: Explication, widget: markdown }
              - { name: source, label: Source, widget: string, required: false }
              - name: alignement
                label: Alignement
                widget: select
                options: ['gauche', 'droite']
                default: gauche
              - *couleurField

          # === Formats (cartes riches) ===
          - name: formats
            label: '📋 Formats (cartes détaillées)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3']
                default: '2'
              - name: formats
                label: Formats
                widget: list
                fields:
                  - { name: titre, label: Titre, widget: string }
                  - { name: description, label: Description, widget: text, required: false }
                  - name: points
                    label: 'Points clés (un par ligne)'
                    widget: list
                    required: false
                    field: { name: point, widget: string, label: Point }
                  - *couleurField
                  - name: cta
                    label: 'Lien (optionnel)'
                    widget: object
                    required: false
                    fields:
                      - { name: label, label: Texte, widget: string }
                      - { name: href, label: URL, widget: string }
                      - { name: externe, label: 'Ouvre nouvel onglet', widget: boolean, default: false }

          # === Citation large ===
          - name: citation-large
            label: '❝ Citation pleine largeur'
            widget: object
            fields:
              - *fondField
              - { name: citation, label: Citation, widget: text }
              - { name: auteur, label: Auteur, widget: string, required: false }
              - { name: role, label: 'Rôle / contexte', widget: string, required: false }
              - name: variant
                label: Style
                widget: select
                options: ['paper', 'beige', 'orange', 'violet']
                default: paper

          # === Texte + photo ===
          - name: texte-photo
            label: '🖼 Texte + photo'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: texte, label: Texte, widget: markdown }
              - { name: image, label: 'Image', widget: image }
              - { name: image_alt, label: "Description de l'image (alt)", widget: string }
              - { name: image_legende, label: "Légende (optionnel)", widget: string, required: false }
              - { name: image_credit, label: 'Crédit photo (optionnel)', widget: string, required: false }
              - name: position
                label: "Position de l'image"
                widget: select
                options: ['gauche', 'droite']
                default: droite
              - name: ratio
                label: "Répartition texte / image"
                widget: select
                options: ['50-50', '2-tiers-texte', '2-tiers-image']
                default: '50-50'
                hint: "50-50 : moitié-moitié · 2-tiers-texte : plus de place pour le texte · 2-tiers-image : plus de place pour l'image."

          # === Figure (image seule centrée) ===
          - name: figure
            label: '🖼 Figure (image seule centrée)'
            widget: object
            fields:
              - *fondField
              - { name: image, label: Image, widget: image }
              - { name: alt, label: "Description de l'image (alt)", widget: string }
              - { name: legende, label: 'Légende (optionnel)', widget: string, required: false }
              - { name: credit, label: 'Crédit photo (optionnel)', widget: string, required: false }
              - name: taille
                label: Taille
                widget: select
                options: ['petite', 'moyenne', 'grande']
                default: moyenne

          # === Galerie ===
          - name: galerie
            label: "🖼 Galerie d'images"
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3', '4']
                default: '3'
              - {
                  name: lightbox,
                  label: "Activer l'ouverture en grand (lightbox)",
                  widget: boolean,
                  default: false,
                }
              - name: images
                label: Images
                widget: list
                fields:
                  - { name: image, label: Image, widget: image }
                  - { name: alt, label: 'Description (alt)', widget: string }
                  - { name: legende, label: 'Légende (optionnel)', widget: string, required: false }

          # === Bandeau image pleine largeur ===
          - name: bandeau-image
            label: '🖼 Bandeau image pleine largeur'
            widget: object
            fields:
              - { name: image, label: Image, widget: image }
              - { name: alt, label: "Description de l'image (alt)", widget: string }
              - { name: titre, label: Titre, widget: string }
              - { name: sousTitre, label: 'Sous-titre (optionnel)', widget: string, required: false }
              - name: hauteur
                label: Hauteur
                widget: select
                options: ['petite', 'moyenne', 'grande']
                default: moyenne
              - name: position_texte
                label: 'Position du texte (horizontal)'
                widget: select
                options: ['gauche', 'centre', 'droite']
                default: centre
              - name: position_verticale
                label: 'Position du texte (vertical)'
                widget: select
                options: ['haut', 'milieu', 'bas']
                default: milieu
              - {
                  name: scrim,
                  label: 'Assombrir le bas pour lisibilité',
                  widget: boolean,
                  default: true,
                  hint: 'Recommandé pour garantir la lisibilité du texte blanc sur image claire.',
                }

          # === Portraits (grille personnes) ===
          - name: portraits
            label: '👤 Portraits (grille de personnes)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: colonnes
                label: Colonnes
                widget: select
                options: ['2', '3', '4']
                default: '3'
              - name: forme
                label: 'Forme des photos'
                widget: select
                options: ['rond', 'carre']
                default: rond
              - name: personnes
                label: Personnes
                widget: list
                fields:
                  - { name: nom, label: 'Nom', widget: string }
                  - { name: role, label: 'Rôle / fonction', widget: string, required: false }
                  - { name: photo, label: Photo, widget: image, required: false }
                  - { name: photo_alt, label: "Description photo (alt)", widget: string, required: false }
                  - { name: bio, label: 'Bio courte (optionnel)', widget: text, required: false }
                  - { name: lien, label: 'Lien externe (optionnel)', widget: string, required: false }
                  - { name: lien_label, label: 'Libellé du lien', widget: string, required: false }

          # === Lettre adressée ===
          - name: lettre
            label: '✉ Lettre adressée'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: ouverture, label: 'Ouverture', widget: string, required: false, default: 'Bonjour,', hint: "Première ligne, en italique." }
              - { name: corps, label: 'Corps de la lettre', widget: markdown, hint: "Plusieurs paragraphes. *italique* pour l'accent." }
              - { name: signature, label: 'Signature', widget: string, required: false, default: '— l''équipe.' }
              - name: variant
                label: 'Couleur d''accent'
                widget: select
                options: ['orange', 'violet']
                default: orange

          # === Statistique en majesté ===
          - name: stat-majeste
            label: '📊 Statistique en majesté'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - { name: chiffre, label: 'Chiffre', widget: string, hint: "Court : 90 %, 1/3, ×4…" }
              - { name: texte, label: 'Texte explicatif', widget: text, hint: "Une à deux phrases. *italique* pour mettre en valeur un chiffre secondaire." }
              - { name: source, label: 'Source', widget: string, required: false }
              - { name: eyebrow, label: 'Eyebrow', widget: string, required: false, default: '— constat' }
              - name: variant
                label: 'Couleur du chiffre'
                widget: select
                options: ['orange', 'violet']
                default: orange

          # === Timeline (frise chronologique) ===
          - name: timeline
            label: '📅 Timeline (frise chronologique)'
            widget: object
            fields:
              - { name: titre, label: 'Titre de la section', widget: string, required: false }
              - *fondField
              - name: alignement
                label: Alignement
                widget: select
                options: ['vertical', 'alterne']
                default: vertical
                hint: "Vertical : toutes les étapes à gauche. Alterné : zig-zag gauche/droite (desktop)."
              - name: etapes
                label: Étapes
                widget: list
                fields:
                  - { name: date, label: Date, widget: string, hint: "Ex: 2024, Mars 2025, 15 juin…" }
                  - { name: titre, label: Titre, widget: string }
                  - { name: texte, label: 'Texte (optionnel)', widget: text, required: false }
                  - { name: image, label: 'Image (optionnel)', widget: image, required: false }
                  - { name: image_alt, label: "Description image (alt)", widget: string, required: false }

  # ---- Actualités (blog) ----
  - name: actualites
    label: Actualités
    label_singular: Actualité
    folder: content/actualites
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{date | date("DD/MM/YYYY")}} — {{title}}'
    fields:
      - { name: title, label: Titre, widget: string }
      - {
          name: description,
          label: 'Description / chapô',
          widget: text,
          required: false,
          hint: "Une ou deux phrases affichées dans la liste et en SEO.",
        }
      - { name: date, label: 'Date de publication', widget: datetime, picker_utc: false }
      - { name: auteur, label: Auteur, widget: string, required: false }
      - { name: cover, label: 'Image principale', widget: image, required: false }
      - {
          name: cover_alt,
          label: "Description de l'image (alt)",
          widget: string,
          required: false,
        }
      - name: tags
        label: Tags
        widget: list
        required: false
        field: { name: tag, widget: string, label: Tag }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, l'article n'apparaît pas en ligne — utile pendant la rédaction.",
        }
      - { name: body, label: Contenu, widget: markdown }

  # ---- Agenda ----
  - name: evenements
    label: Événements
    label_singular: Événement
    folder: content/evenements
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{date_debut | date("DD/MM/YYYY")}} — {{title}}'
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: date_debut, label: 'Début', widget: datetime, picker_utc: false }
      - { name: date_fin, label: 'Fin', widget: datetime, picker_utc: false, required: false }
      - { name: lieu, label: Lieu, widget: string }
      - { name: adresse, label: Adresse, widget: string, required: false }
      - { name: cover, label: Image, widget: image, required: false }
      - name: public
        label: Public
        widget: select
        options: ['tout public', 'professionnels', 'femmes concernées', 'adhérents']
      - { name: gratuit, label: Gratuit, widget: boolean, default: true }
      - { name: inscription_url, label: "URL d'inscription", widget: string, required: false }
      - { name: description, label: Description, widget: markdown }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, l'événement n'apparaît pas sur le site en ligne — utile pour préparer tranquillement.",
        }

  # ---- Partenaires / financeurs ----
  - name: partenaires
    label: Partenaires
    label_singular: Partenaire
    folder: content/partenaires
    create: true
    extension: md
    format: frontmatter
    identifier_field: nom
    slug: '{{slug}}'
    fields:
      - { name: nom, label: Nom, widget: string }
      - name: type
        label: Type
        widget: select
        options: ['financeur public', 'financeur privé', 'partenaire associatif', 'réseau']
      - { name: logo, label: Logo, widget: image, required: false }
      - { name: url, label: 'URL du site', widget: string, required: false }
      - { name: description_courte, label: Description courte, widget: string, required: false }
      - { name: ordre, label: 'Ordre d''affichage', widget: number, default: 0, value_type: int }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le partenaire n'apparaît pas sur le site en ligne — utile quand l'accord n'est pas encore validé.",
        }

  # ---- Équipe / CA ----
  - name: equipe
    label: Équipe
    label_singular: Membre
    folder: content/equipe
    create: true
    extension: md
    format: frontmatter
    identifier_field: nom
    slug: '{{slug}}'
    fields:
      - { name: nom, label: 'Nom complet', widget: string }
      - { name: role, label: Rôle, widget: string }
      - { name: photo, label: Photo, widget: image, required: false }
      - { name: bio_courte, label: Bio courte, widget: text, required: false }
      - { name: linkedin, label: 'URL LinkedIn', widget: string, required: false }
      - { name: ordre, label: 'Ordre', widget: number, default: 0, value_type: int }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le membre n'apparaît pas sur le site en ligne.",
        }

  # ---- Documents téléchargeables ----
  - name: documents
    label: Documents
    label_singular: Document
    folder: content/documents
    create: true
    extension: md
    format: frontmatter
    identifier_field: titre
    slug: '{{slug}}'
    fields:
      - { name: titre, label: Titre, widget: string }
      - name: categorie
        label: Catégorie
        widget: select
        options:
          ['projet associatif', "rapport d'activité", 'ressource', 'communication', 'présentation']
      - {
          name: fichier,
          label: 'Fichier (PDF)',
          widget: file,
          required: false,
          hint: "Optionnel si le document est à paraître.",
        }
      - { name: date, label: Date, widget: datetime, type: date, required: false }
      - { name: description_courte, label: Description courte, widget: text, required: false }
      - {
          name: a_paraitre,
          label: 'À paraître ?',
          widget: boolean,
          default: false,
          hint: "Si coché, le document apparaît comme 'À paraître' sans lien de téléchargement.",
        }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le document n'apparaît pas sur le site en ligne.",
        }

  # ---- Témoignages ----
  - name: temoignages
    label: Témoignages
    label_singular: Témoignage
    folder: content/temoignages
    create: true
    extension: md
    format: frontmatter
    identifier_field: auteur
    slug: '{{slug}}'
    fields:
      - { name: auteur, label: Auteur, widget: string }
      - { name: role, label: 'Rôle / contexte', widget: string, required: false }
      - name: contexte
        label: Type
        widget: select
        options: ['participante', 'partenaire', 'professionnelle']
      - { name: photo, label: Photo, widget: image, required: false }
      - { name: ordre, label: 'Ordre', widget: number, default: 0, value_type: int }
      - {
          name: fictif,
          label: 'Témoignage fictif ?',
          widget: boolean,
          default: false,
          hint: 'Si coché, affiche un ruban « À valider » sur le site — utile pour les placeholders.',
        }
      - {
          name: draft,
          label: 'Brouillon',
          widget: boolean,
          default: false,
          required: false,
          hint: "Si coché, le témoignage n'apparaît pas sur le site en ligne — utile tant que la personne n'a pas validé sa citation.",
        }
      - { name: body, label: Texte, widget: markdown }

  # ---- Paramètres globaux du site ----
  - name: site
    label: Paramètres globaux
    files:
      - name: settings
        label: Paramètres
        file: content/site/settings.md
        fields:
          - { name: nom_asso, label: "Nom de l'association", widget: string }
          - { name: accroche_globale, label: Accroche globale, widget: string }
          - { name: email_contact, label: Email contact, widget: string }
          - { name: telephone, label: Téléphone, widget: string }
          - { name: adresse, label: Adresse, widget: string }
          - { name: helloasso_url, label: URL HelloAsso don, widget: string }
          - name: reseaux
            label: Réseaux sociaux
            widget: object
            fields:
              - { name: facebook, label: Facebook, widget: string, required: false }
              - { name: instagram, label: Instagram, widget: string, required: false }
              - { name: linkedin, label: LinkedIn, widget: string, required: false }
          - name: banderole_urgence
            label: "Banderole d'urgence (message en haut de site)"
            widget: object
            required: false
            fields:
              - { name: active, label: Active, widget: boolean, default: false }
              - { name: message, label: Message, widget: markdown, required: false }
              - name: couleur
                label: Couleur
                widget: select
                options: ['orange', 'violet', 'magenta']
                default: orange
