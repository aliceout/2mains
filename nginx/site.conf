# Config nginx du container site. Termine en HTTP — la terminaison TLS
# est faite par le reverse proxy nginx du VPS qui fait proxy_pass vers
# 127.0.0.1:8064. Pas de souci avec HTTPS ici, on est interne au réseau
# Docker.

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # On hérite du mapping mime.types complet défini au niveau http dans
  # /etc/nginx/nginx.conf — surtout NE PAS déclarer un `types { … }` ici,
  # ça remplace toute la table et les .html tombent sur default_type
  # (application/octet-stream → téléchargement au lieu d'affichage).
  # nginx 1.27 inclut déjà text/calendar, image/avif et
  # application/manifest+json dans le mime.types par défaut.
  default_type application/octet-stream;

  # Compression — économise bande passante et latence sur les routeurs
  # serrés (le formulaire RSS, les sitemaps, les SVG inline).
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/rss+xml
    application/xml
    image/svg+xml
    text/calendar
    text/css
    text/plain
    text/xml;

  # text/calendar n'est pas dans la mime.types upstream de nginx — on
  # le force via un location matcher dédié pour les flux iCal (events
  # individuels et flux global d'agenda).
  location ~ \.ics$ {
    default_type text/calendar;
    charset utf-8;
  }

  # Cache long pour les assets versionnés Astro (hash dans le nom).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Fonts auto-hébergées : versions stables, cachables longuement.
  location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Images uploadées et leurs variantes optimisées : aussi cachables
  # longuement (le hash dans le chemin garantit l'invalidation).
  location /uploads/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Routing standard Astro avec trailingSlash: ignore — on essaie le
  # fichier exact, puis le dossier (avec index.html), puis 404.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  # 404 custom (rendu par Astro dans dist/404.html).
  error_page 404 /404.html;

  # Sécurité de base.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
}
